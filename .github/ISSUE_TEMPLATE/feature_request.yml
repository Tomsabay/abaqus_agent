name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What feature would you like to see?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe the problem this feature would solve
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New geometry type
        - New analysis type
        - LLM integration
        - Post-processing
        - MCP / API
        - Documentation
        - Other
  - type: dropdown
    id: willing-to-contribute
    attributes:
      label: Would you be willing to contribute a PR?
      options:
        - "Yes"
        - "Maybe with guidance"
        - "No"
