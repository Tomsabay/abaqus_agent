name: Bug Report
description: Report a bug in Abaqus Agent
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run `abaqus-agent ...`
        2. Submit spec with ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error Output / Logs
      description: Paste any relevant error messages or logs
      render: shell
  - type: dropdown
    id: abaqus-version
    attributes:
      label: Abaqus Version
      options:
        - "2023"
        - "2024"
        - "2025"
        - "N/A (no Abaqus)"
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., Ubuntu 22.04, Windows 11, RHEL 8
  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: e.g., 3.11.5
