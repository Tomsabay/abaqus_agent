name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests (no Abaqus required)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Run spec dry-run benchmark
        run: python run_benchmark.py --dry-run

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check . --select E,F,W --ignore E501,F401 || true

  server-smoke:
    name: Server Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt fastapi uvicorn python-multipart
      - name: Start server and test health endpoint
        run: |
          python server.py &
          sleep 4
          curl -sf http://localhost:8000/health | python -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d['status'] == 'ok', f'Expected ok, got {d}'
          assert 'cases' in d
          print('Health check passed:', d)
          "
          kill %1
