services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./cases:/app/cases
      - ./reports:/app/reports

  mcp-bridge:
    build: .
    command: python mcp_bridge.py
    ports:
      - "8001:8001"
    depends_on:
      - api
